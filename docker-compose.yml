services:
  app:
    container_name: quipthread
    image: ghcr.io/quipthread/quipthread:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-/data/db.sqlite}
    volumes:
      - quipthread-data:/data
    expose:
      - "8080"
    networks:
      - quipthread

  caddy:
    container_name: quipthread_proxy
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - quipthread-caddy-data:/data
      - quipthread-caddy-config:/config
    networks:
      - quipthread

networks:
  quipthread:
    name: quipthread

volumes:
  quipthread-data:
  quipthread-caddy-data:
  quipthread-caddy-config:
