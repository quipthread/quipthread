services:
  app:
    image: ghcr.io/quipthread/quipthread:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: /data/db.sqlite
    volumes:
      - data:/data
      - ./deploy/litestream.yml:/etc/litestream.yml:ro
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  data:
  caddy-data:
  caddy-config:
