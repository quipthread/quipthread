version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - noctx
    - revive
    - gosec
    - bodyclose
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - errcheck
          - unparam
          - gosec
          - noctx

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/quipthread/quipthread

