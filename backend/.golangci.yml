run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - noctx
    - revive
    - gosec
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: github.com/quipthread/quipthread
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: exported

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
        - gosec
