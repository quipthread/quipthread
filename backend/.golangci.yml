run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - noctx

linters-settings:
  goimports:
    local-prefixes: github.com/quipthread/quipthread

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
