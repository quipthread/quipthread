# Litestream config for local development with MinIO.
exec: /usr/local/bin/quipthread

dbs:
  - path: /data/db.sqlite
    replicas:
      - type: s3
        bucket: quipthread
        path: db.sqlite
        endpoint: http://minio:9000
        access-key-id: minioadmin
        secret-access-key: minioadmin
        force-path-style: true
